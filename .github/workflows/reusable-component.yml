name: Reusable Component Pipeline

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      working-directory:
        required: true
        type: string
      command:
        required: true
        type: string
    outputs:
      executed_component:
        description: "Component executed"
        value: ${{ jobs.run-component.outputs.executed_component }}

jobs:
  run-component:
    runs-on: ubuntu-latest
    outputs:
      executed_component: ${{ steps.out.outputs.executed_component }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute component pipeline
        shell: bash
        run: |
          echo "Running pipeline for ${{ inputs.component }}"
          cd "${{ inputs.working-directory }}"
          bash -lc '${{ inputs.command }}'

      - name: Set outputs
        id: out
        shell: bash
        run: echo "executed_component=${{ inputs.component }}" >> "$GITHUB_OUTPUT"
