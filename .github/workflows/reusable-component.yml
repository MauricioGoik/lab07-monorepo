name: Reusable Component Pipeline

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      working-directory:
        required: true
        type: string
      command:
        required: true
        type: string
    outputs:
      executed_component:
        description: "Component executed"
        value: ${{ jobs.run-component.outputs.executed_component }}

jobs:
  run-component:
    runs-on: ubuntu-latest
    outputs:
      executed_component: ${{ steps.out.outputs.executed_component }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute component pipeline
        run: |
          echo "Running pipeline for ${{ inputs.component }}"
          ${{ inputs.command }}

      - name: Set outputs
        id: out
        run: echo "executed_component=${{ inputs.component }}" >> "$GITHUB_OUTPUT"
